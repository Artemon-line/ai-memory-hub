# ai-memory-hub configuration file
# Phase 1 (MVP): deterministic, schema-first ingestion.

# -------------------------
# STORAGE LAYER
# -------------------------
storage:
  dry_run: false
  metadata_schema_versions: [1]
  vector:
    # set false in production to fail fast on vector init errors
    allow_fallback: true
    distance: cosine
  vector_providers:
    chromadb:
      path: ./data/chromadb
      url: ""
      host: 127.0.0.1
      port: 8000
      collection: memory_vectors
    qdrant:
      url: http://127.0.0.1:6333
      api_key: ""
      collection: memory_vectors
      prefer_grpc: false
    milvus:
      uri: http://127.0.0.1:19530
      token: ""
      collection: memory_vectors
    weaviate:
      url: http://127.0.0.1:8080
      api_key: ""
      collection: MemoryVector
    mongodb_atlas:
      uri: ""
      database: ai_memory_hub
      collection: memory_vectors
      index: memory_vector_index
    elasticsearch:
      url: http://127.0.0.1:9200
      username: ""
      password: ""
      index: memory_vectors
    opensearch:
      url: http://127.0.0.1:9200
      username: ""
      password: ""
      index: memory_vectors
  metadata_providers:
    mongodb:
      uri: ""
      database: ai_memory_hub
      conversations_collection: conversations
      facts_collection: facts
      generated_summaries_collection: generated_summaries
      schema_collection: schema_versions

tokenizer:
  enabled: false
  encoding: cl100k_base

ask:
  max_context_tokens: 2000

retrieval:
  vector_score_threshold: 7.5
  keyword_enabled: true
  keyword_candidate_limit: 50
  keyword_weight: 0.25
  metadata_weight: 0.15
  candidate_multiplier: 3

chunking:
  strategy: message
  max_tokens: 800
  overlap_tokens: 80

# -------------------------
# PROVIDERS (BYOS/BYOA)
# -------------------------
providers:
  embeddings: openai # Embedding provider used for chunk vectors
  embedding_model: 'nomic-embed-text'
  embedding_dimension: 768
  metadata_db: sqlite # sqlite | postgres | mongodb
  metadata_dsn: '' # required when metadata_db=postgres
  # lancedb | chromadb | qdrant | milvus | weaviate | mongodb_atlas |
  # elasticsearch | opensearch | pgvector | memory | in_memory
  vector_db: lancedb
  agent: mvp # Phase 1 ingestion agent (deterministic pipeline)

# -------------------------
# INTERFACES
# -------------------------
interfaces:
  mcp: true # Enable MCP tools
  api: true # Enable HTTP API (local-only by default)

# -------------------------
# PATHS
# -------------------------
paths:
  data_dir: './data' # SQLite/LanceDB data path
  logs_dir: './logs'

# -------------------------
# SCHEMA
# -------------------------
schema:
  file: './memory/schema/conversation.schema.json'

# -------------------------
# MCP SERVER SETTINGS
# -------------------------
mcp:
  host: '127.0.0.1'
  port: 8765

# -------------------------
# API SERVER SETTINGS
# -------------------------
api:
  host: '127.0.0.1'
  port: 8000
  auth: none # none | api_key
  api_key: '' # only used if auth: api_key

# -------------------------
# PROVIDER SETTINGS
# -------------------------
openai:
  base_url: 'http://localhost:11434/v1' # for Ollama usage
  api_key: 'dummy_key'
