services:
  redis:
    image: redis/redis-stack-server:7.4.0-v8
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  ai-memory-hub:
    build:
      context: ../../..
      dockerfile: examples/storage_providers/redis/Containerfile
    restart: on-failure
    depends_on:
      - redis
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro,Z
      - hub_data:/data
      - hub_logs:/logs

volumes:
  redis_data:
  hub_data:
  hub_logs:
