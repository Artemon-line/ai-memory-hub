services:
  ai-memory-hub:
    build:
      context: ../../..
      dockerfile: examples/storage_providers/sqlite-lancedb/Containerfile
    restart: on-failure
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro,Z
      - hub_data:/data
      - hub_logs:/logs

volumes:
  hub_data:
  hub_logs:
