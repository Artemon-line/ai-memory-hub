services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
      POSTGRES_DB: memory
    ports:
      # Keep Postgres local to this host. Remote clients only need the hub API/MCP port.
      - "127.0.0.1:5432:5432"
    volumes:
      - amh_pgvector_data:/var/lib/postgresql/data
    healthcheck:
      # Wait until Postgres accepts connections for the configured user/database.
      test: ["CMD-SHELL", "pg_isready -U memory -d memory"]
      interval: 5s
      timeout: 3s
      retries: 20

  ai-memory-hub:
    build:
      context: ../../..
      dockerfile: examples/storage_providers/postgres-pgvector/Containerfile
    extra_hosts:
      # Makes host.docker.internal work on Linux Docker Engine as well as Docker Desktop.
      - "host.docker.internal:host-gateway"
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Keep the unauthenticated local smoke example on loopback by default.
      # For LAN use, bind through a protected reverse proxy or enable
      # api.auth: oauth_resource_server before publishing this port.
      - "127.0.0.1:8000:8000"
    volumes:
      # The :Z suffix makes this bind mount work with rootless Podman on
      # SELinux-enabled hosts. Docker ignores the SELinux relabel option.
      - ./${AMH_CONFIG_FILE:-config.yaml}:/app/config.yaml:ro,Z
      - amh_hub_data:/data
      - amh_hub_logs:/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  amh_pgvector_data:
  amh_hub_data:
  amh_hub_logs:
