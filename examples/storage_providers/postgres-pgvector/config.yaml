# ai-memory-hub Docker/Podman Compose config for Postgres metadata + PGVector vectors.
# This file is mounted over /app/config.yaml by examples/storage_providers/postgres-pgvector/compose.yaml.

storage:
  dry_run: false
  allow_trusted_appends: false
  # Metadata schema compatibility allow-list. Version 1 is current; migrations
  # may temporarily allow multiple versions, e.g. [1, 2].
  metadata_schema_versions: [1]
  vector:
    allow_fallback: false
    distance: cosine
  metadata_providers:
    postgres:
      url: postgresql://memory:memory@postgres:5432/memory
  vector_providers:
    pgvector:
      url: postgresql://memory:memory@postgres:5432/memory
      table_name: memory_vectors

tokenizer:
  enabled: true
  encoding: cl100k_base

ask:
  max_context_tokens: 2000

retrieval:
  vector_score_threshold: 7.5
  keyword_enabled: true
  keyword_candidate_limit: 50
  keyword_weight: 0.25
  metadata_weight: 0.15
  candidate_multiplier: 3

memory:
  insert_policy: permissive

chunking:
  strategy: message
  max_tokens: 800
  overlap_tokens: 80

providers:
  # Local deterministic embeddings keep this compose example credential-free.
  embeddings: local
  embedding_model: local-hash
  embedding_dimension: 32
  metadata_db: postgres
  vector_db: pgvector
  agent: mvp

interfaces:
  mcp: true
  api: true

paths:
  data_dir: /data
  logs_dir: /logs

schema:
  file: /app/memory/schema/conversation.schema.json

mcp:
  host: 0.0.0.0
  port: 8765

api:
  host: 0.0.0.0
  port: 8000
  # Local smoke-test default. Before publishing MCP outside loopback, configure
  # oauth_resource_server and expose the service through TLS, a trusted reverse
  # proxy, VPN, or another protected private-network boundary.
  auth: none

openai:
  base_url: http://localhost:11434/v1
  api_key: dummy_key
