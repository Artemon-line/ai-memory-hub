services:
  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma

  ai-memory-hub:
    build:
      context: ../../..
      dockerfile: examples/storage_providers/chromadb/Containerfile
    restart: on-failure
    depends_on:
      - chromadb
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro,Z
      - hub_data:/data
      - hub_logs:/logs

volumes:
  chromadb_data:
  hub_data:
  hub_logs:
