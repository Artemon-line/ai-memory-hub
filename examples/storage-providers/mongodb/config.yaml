# MongoDB metadata + LanceDB vectors.
storage:
  dry_run: false
  allow_trusted_appends: false
  metadata_schema_versions: [1]
  vector:
    allow_fallback: false
    distance: cosine
  metadata_providers:
    mongodb:
      uri: mongodb://mongodb:27017
      database: ai_memory_hub
      conversations_collection: conversations
      facts_collection: facts
      generated_summaries_collection: generated_summaries
      schema_collection: schema_versions

providers:
  embeddings: local
  embedding_model: local-hash
  embedding_dimension: 32
  metadata_db: mongodb
  vector_db: lancedb

interfaces:
  mcp: true
  api: true

paths:
  data_dir: /data
  logs_dir: /logs

schema:
  file: /app/memory/schema/conversation.schema.json

api:
  host: 0.0.0.0
  port: 8000
  auth: none
