# SQLite metadata + ChromaDB HTTP vectors.
storage:
  dry_run: false
  allow_trusted_appends: false
  metadata_schema_versions: [1]
  vector:
    allow_fallback: false
    distance: cosine
  vector_providers:
    chromadb:
      url: http://chromadb:8000
      collection: memory_vectors

providers:
  embeddings: local
  embedding_model: local-hash
  embedding_dimension: 32
  metadata_db: sqlite
  vector_db: chromadb

interfaces:
  mcp: true
  api: true

paths:
  data_dir: /data
  logs_dir: /logs

schema:
  file: /app/memory/schema/conversation.schema.json

api:
  host: 0.0.0.0
  port: 8000
  auth: none
