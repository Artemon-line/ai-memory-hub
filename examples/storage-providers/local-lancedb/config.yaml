# Local SQLite metadata + LanceDB vectors.
storage:
  dry_run: false
  allow_trusted_appends: false
  metadata_schema_versions: [1]
  vector:
    allow_fallback: false
    distance: cosine

providers:
  embeddings: local
  embedding_model: local-hash
  embedding_dimension: 32
  metadata_db: sqlite
  vector_db: lancedb

interfaces:
  mcp: true
  api: true

paths:
  data_dir: ./data/local-lancedb
  logs_dir: ./logs/local-lancedb

schema:
  file: ./memory/schema/conversation.schema.json

api:
  host: 127.0.0.1
  port: 8000
  auth: none
