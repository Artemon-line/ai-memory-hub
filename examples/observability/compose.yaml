services:
  ai-memory-hub:
    build:
      context: ../..
      dockerfile: Containerfile
    depends_on:
      otel-collector:
        condition: service_started
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - amh_observability_data:/data
      - amh_observability_logs:/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:8889:8889"
    depends_on:
      jaeger:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686"

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - amh_prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      otel-collector:
        condition: service_started

volumes:
  amh_observability_data:
  amh_observability_logs:
  amh_prometheus_data:
