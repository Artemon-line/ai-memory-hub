providers:
  embeddings: local
  embedding_dimension: 32
  metadata_db: sqlite
  vector_db: in_memory

interfaces:
  mcp: true
  api: true

paths:
  data_dir: /data
  logs_dir: /logs

api:
  host: 0.0.0.0
  port: 8000
  auth: none

observability:
  logging:
    enabled: true
    format: json
    level: INFO
    access_logs: true
    request_id_header: x-request-id
    include_stack_traces: true
  tracing:
    enabled: true
    endpoint: http://otel-collector:4317
    protocol: grpc
    sample_ratio: 1.0
    service_name: ai-memory-hub
    environment: local-observability
  metrics:
    enabled: true
    endpoint: http://otel-collector:4317
    protocol: grpc
  debug_payloads: false
  embedding_readiness_probe: false
