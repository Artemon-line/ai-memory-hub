# ai-memory-hub Docker/Podman Compose config for Postgres metadata + PGVector vectors.
# This file is mounted over /app/config.yaml by examples/postgres/pgvector/compose.yaml.

storage:
  dry_run: false
  allow_trusted_appends: false
  metadata_schema_versions: [1]
  vector:
    allow_fallback: false
    distance: cosine

tokenizer:
  enabled: true
  encoding: cl100k_base

ask:
  max_context_tokens: 2000

retrieval:
  vector_score_threshold: 7.5
  keyword_enabled: true
  keyword_candidate_limit: 50
  keyword_weight: 0.25
  metadata_weight: 0.15
  candidate_multiplier: 3

chunking:
  strategy: message
  max_tokens: 800
  overlap_tokens: 80

providers:
  # Local deterministic embeddings keep this compose example credential-free.
  embeddings: local
  embedding_model: local-hash
  embedding_dimension: 32
  metadata_db: postgres
  metadata_dsn: postgresql://memory:memory@postgres:5432/memory
  vector_db: pgvector
  agent: mvp

interfaces:
  mcp: true
  api: true

paths:
  data_dir: /data
  logs_dir: /logs

schema:
  file: /app/memory/schema/conversation.schema.json

mcp:
  host: 0.0.0.0
  port: 8765

api:
  host: 0.0.0.0
  port: 8000
  # Local smoke-test default. Before using this 0.0.0.0 Compose stack from
  # another PC, seed a token in Postgres and change this to bearer_token.
  # Clients must then send Authorization: Bearer <token> to /memory/* and /mcp/*.
  auth: none

openai:
  base_url: http://localhost:11434/v1
  api_key: dummy_key
