name: ci

on:
  push:
  pull_request:

permissions:
  contents: read
  checks: write
  issues: read

jobs:
  test:
    name: Unit and Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit and integration tests
        env:
          PYTHONHASHSEED: '0'
        run: |
          mkdir -p reports/junit
          uv run pytest tests/unit tests/integration \
            --junitxml=reports/junit/pytest-unit-integration.xml

      - name: Publish unit and integration test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: >-
          ${{
            always() &&
            hashFiles('reports/junit/*.xml') != '' &&
            (github.event_name != 'pull_request' ||
              github.event.pull_request.head.repo.full_name == github.repository)
          }}
        with:
          files: reports/junit/*.xml
          check_name: Unit and Integration Test Results
          comment_mode: off

      - name: Upload unit and integration test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-unit-integration-report
          path: reports/junit/*.xml
          if-no-files-found: warn

  e2e:
    name: E2E Scenario (Ollama)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sudo -E sh

      - name: Start Ollama
        run: |
          ollama serve &
          # Wait for the HTTP port to open
          for i in {1..10}; do
            if curl -s http://localhost:11434 > /dev/null; then
              echo "Ollama is ready!"
              exit 0
            fi
            echo "Waiting for Ollama..."
            sleep 2
          done
          echo "Ollama failed to start"
          exit 1

      - name: Pull models
        run: |
          ollama pull nomic-embed-text
          ollama pull qwen2.5:0.5b

      - name: Run E2E tests
        env:
          PYTHONHASHSEED: '0'
          AMH_OLLAMA_CHAT_MODEL: qwen2.5:0.5b
        run: |
          mkdir -p reports/junit
          uv run pytest tests/e2e \
            --junitxml=reports/junit/pytest-e2e.xml

      - name: Publish E2E test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: >-
          ${{
            always() &&
            hashFiles('reports/junit/*.xml') != '' &&
            (github.event_name != 'pull_request' ||
              github.event.pull_request.head.repo.full_name == github.repository)
          }}
        with:
          files: reports/junit/*.xml
          check_name: E2E Test Results
          comment_mode: off

      - name: Upload E2E test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-e2e-report
          path: reports/junit/*.xml
          if-no-files-found: warn

  storage-config:
    name: Storage Config Variations
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        case:
          - sqlite-default
          - dry-run
          - fallback-disabled
          - custom-schema

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run targeted storage checks
        env:
          PYTHONHASHSEED: '0'
        run: |
          mkdir -p reports/junit
          if [ "${{ matrix.case }}" = "sqlite-default" ]; then
            uv run pytest -q tests/integration/test_storage_features.py -k \
              "sqlite_capabilities_and_health or \
              build_runtime_fails_fast_on_schema_version" \
              --junitxml=reports/junit/pytest-storage-${{ matrix.case }}.xml
          elif [ "${{ matrix.case }}" = "dry-run" ]; then
            uv run pytest -q tests/integration/test_storage_features.py -k \
              "dry_run_write_is_noop or \
              runtime_health_reports_dry_run" \
              --junitxml=reports/junit/pytest-storage-${{ matrix.case }}.xml
          elif [ "${{ matrix.case }}" = "custom-schema" ]; then
            uv run pytest -q tests/unit/test_mvp_ingestion.py -k \
              "schema_file_from_config_is_used" \
              --junitxml=reports/junit/pytest-storage-${{ matrix.case }}.xml
          else
            uv run pytest -q tests/integration/test_storage_features.py -k \
              "build_runtime_vector_fallback_disabled_raises" \
              --junitxml=reports/junit/pytest-storage-${{ matrix.case }}.xml
          fi

      - name: Publish storage config test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: >-
          ${{
            always() &&
            hashFiles('reports/junit/*.xml') != '' &&
            (github.event_name != 'pull_request' ||
              github.event.pull_request.head.repo.full_name == github.repository)
          }}
        with:
          files: reports/junit/*.xml
          check_name: Storage Config Test Results (${{ matrix.case }})
          comment_mode: off

      - name: Upload storage config test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-storage-config-${{ matrix.case }}-report
          path: reports/junit/*.xml
          if-no-files-found: warn

  storage-postgres:
    name: Storage Postgres Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: memory
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d memory"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --dev
          uv pip install psycopg[binary]

      - name: Run postgres + pgvector storage checks
        env:
          PYTHONHASHSEED: '0'
          AMH_TEST_POSTGRES_DSN: postgresql://test:test@127.0.0.1:5432/memory
        run: >
          mkdir -p reports/junit &&
          uv run pytest -q tests/integration/test_storage_features.py -k
          "postgres_live_integration_when_dsn_provided or
          postgres_schema_version or
          pgvector_live_integration_when_dsn_provided or
          runtime_postgres_pgvector_live_integration_when_dsn_provided"
          --junitxml=reports/junit/pytest-postgres-storage.xml

      - name: Publish postgres storage test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: >-
          ${{
            always() &&
            hashFiles('reports/junit/*.xml') != '' &&
            (github.event_name != 'pull_request' ||
              github.event.pull_request.head.repo.full_name == github.repository)
          }}
        with:
          files: reports/junit/*.xml
          check_name: Postgres Storage Test Results
          comment_mode: off

      - name: Upload postgres storage test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-postgres-storage-report
          path: reports/junit/*.xml
          if-no-files-found: warn

  container-lint:
    name: Containerfile Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Containerfile

  container:
    name: Container Build and Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read package version
        id: version
        run: |
          python <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib

          with open("pyproject.toml", "rb") as config_file:
              version = tomllib.load(config_file)["project"]["version"]
          print(f"version={version}")
          PY

      - name: Build image
        run: |
          docker build \
            --build-arg VERSION="${{ steps.version.outputs.version }}" \
            --build-arg REVISION="${GITHUB_SHA}" \
            --build-arg SOURCE="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            -t ai-memory-hub:ci \
            -f Containerfile .

      - name: Start container
        run: |
          docker run -d --name ai-memory-hub-ci -p 8000:8000 ai-memory-hub:ci

      - name: Smoke readiness
        run: |
          for i in {1..30}; do
            if curl --max-time 5 -fsS http://127.0.0.1:8000/ready; then
              exit 0
            fi
            if [ "$(docker inspect --format '{{.State.Running}}' ai-memory-hub-ci)" != "true" ]; then
              docker inspect \
                --format 'container exited with code {{.State.ExitCode}}: {{.State.Error}}' \
                ai-memory-hub-ci
              docker logs ai-memory-hub-ci
              exit 1
            fi
            sleep 2
          done
          docker logs ai-memory-hub-ci
          exit 1

      - name: Smoke MCP initialize
        run: |
          curl --max-time 10 -fsS -X POST http://127.0.0.1:8000/mcp/ \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{
              "jsonrpc": "2.0",
              "id": 1,
              "method": "initialize",
              "params": {
                "protocolVersion": "2025-06-18",
                "capabilities": {},
                "clientInfo": {"name": "container-smoke", "version": "0.1.0"}
              }
            }'

      - name: Smoke non-root writable paths
        run: |
          docker exec ai-memory-hub-ci sh -c 'test "$(id -u)" = "1001"'
          docker run --rm --user 12345:0 --entrypoint sh ai-memory-hub:ci -c \
            'test -w /app/data && test -w /app/logs && test -w "$TIKTOKEN_CACHE_DIR"'

      - name: Capture container logs
        if: always()
        run: docker logs ai-memory-hub-ci > container.log 2>&1 || true

      - name: Upload container logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: container-smoke-logs
          path: container.log

      - name: Stop container
        if: always()
        run: docker rm -f ai-memory-hub-ci || true
