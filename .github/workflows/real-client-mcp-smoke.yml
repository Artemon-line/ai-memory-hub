name: real-client-mcp-smoke

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  real-client-mcp-smoke:
    name: Real-Client MCP Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run real-client MCP smoke harness
        env:
          PYTHONHASHSEED: '0'
        run: >
          uv run python -m memory.tools.real_client_smoke
          --artifact-dir artifacts/real-client-mcp-smoke

      - name: Upload real-client smoke artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: real-client-mcp-smoke
          path: artifacts/real-client-mcp-smoke
          if-no-files-found: warn
