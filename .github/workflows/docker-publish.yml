name: docker-publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, such as v0.1.0 or v0.1.0-rc.1.
        required: true
        type: string
      prerelease:
        description: Treat this manual publish as a prerelease.
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  docker-publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout requested release tag
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          case "$RELEASE_TAG" in
            v[0-9]*)
              ;;
            *)
              echo "Release tag must start with v followed by a version, got: $RELEASE_TAG" >&2
              exit 1
              ;;
          esac
          git fetch --force --tags origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          git checkout --detach "refs/tags/${RELEASE_TAG}"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Resolve release inputs
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.tag }}"
            event_prerelease="${{ inputs.prerelease }}"
          else
            release_tag="${{ github.event.release.tag_name }}"
            event_prerelease="${{ github.event.release.prerelease }}"
          fi

          python tools/validate_release_version.py "$release_tag" --github-output > release-version.out
          cat release-version.out >> "$GITHUB_OUTPUT"
          {
            echo "event_prerelease=$event_prerelease"
            echo "release_tag=$release_tag"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build local image for release scan
        run: docker build --file Containerfile --tag ai-memory-hub:release-scan .

      - name: Scan release image before push
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ai-memory-hub:release-scan
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute Docker tags
        id: docker-tags
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          IS_PRERELEASE: ${{ steps.release.outputs.is_prerelease }}
          EVENT_PRERELEASE: ${{ steps.release.outputs.event_prerelease }}
        run: |
          namespace="${DOCKERHUB_NAMESPACE:-$DOCKERHUB_USERNAME}"
          image="docker.io/${namespace}/ai-memory-hub"

          {
            echo "image=$image"
            echo "tags<<TAGS"
            echo "${image}:${RELEASE_TAG}"
            echo "${image}:${RELEASE_VERSION}"
            if [ "$IS_PRERELEASE" = "false" ] && [ "$EVENT_PRERELEASE" = "false" ]; then
              echo "${image}:latest"
            fi
            echo "TAGS"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Containerfile
          push: true
          tags: ${{ steps.docker-tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=ai-memory-hub
            org.opencontainers.image.description=Local-first deterministic memory ingestion hub
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Smoke published image
        env:
          IMAGE: ${{ steps.docker-tags.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          docker run -d --name ai-memory-hub-published-smoke -p 127.0.0.1:8000:8000 "${IMAGE}@${DIGEST}"
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/ready; then
              docker rm -f ai-memory-hub-published-smoke
              exit 0
            fi
            sleep 2
          done
          docker logs ai-memory-hub-published-smoke
          docker rm -f ai-memory-hub-published-smoke
          exit 1

      - name: Update release notes with published image digest
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          IMAGE: ${{ steps.docker-tags.outputs.image }}
          TAGS: ${{ steps.docker-tags.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          if ! gh release view "$RELEASE_TAG" --json body --jq .body > release-notes.md; then
            echo "No GitHub release found for $RELEASE_TAG; skipping release-note digest update."
            exit 0
          fi

          python <<'PY'
          import os
          from pathlib import Path

          notes_path = Path("release-notes.md")
          body = notes_path.read_text(encoding="utf-8")
          start = "<!-- ai-memory-hub-docker-digest:start -->"
          end = "<!-- ai-memory-hub-docker-digest:end -->"
          tags = "\n".join(
              f"- `{tag}`" for tag in os.environ["TAGS"].splitlines() if tag.strip()
          )
          block = (
              f"{start}\n"
              "## Docker Image\n\n"
              f"Image: `{os.environ['IMAGE']}`\n\n"
              "Tags:\n"
              f"{tags}\n\n"
              f"Digest: `{os.environ['DIGEST']}`\n"
              f"{end}"
          )
          if start in body and end in body:
              prefix, rest = body.split(start, 1)
              _, suffix = rest.split(end, 1)
              body = prefix.rstrip() + "\n\n" + block + suffix
          else:
              body = body.rstrip() + "\n\n" + block + "\n"
          notes_path.write_text(body, encoding="utf-8")
          PY

          gh release edit "$RELEASE_TAG" --notes-file release-notes.md

      - name: Publish summary
        env:
          IMAGE: ${{ steps.docker-tags.outputs.image }}
          TAGS: ${{ steps.docker-tags.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "## Docker image published"
            echo
            echo "Image: \`$IMAGE\`"
            echo
            echo "Tags:"
            echo "$TAGS" | sed 's/^/- `/' | sed 's/$/`/'
            echo
            echo "Digest: \`$DIGEST\`"
            echo
            echo "The GitHub release notes were updated with this digest when the release exists."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Attest published image provenance
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999 # v4
        with:
          subject-name: ${{ steps.docker-tags.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
