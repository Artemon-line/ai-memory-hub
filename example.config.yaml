# ai-memory-hub configuration file
# Documented example with common variations.
# Keep this file committed as a reference template.

# -------------------------
# STORAGE LAYER
# -------------------------
storage:
  # local | development | test | production
  # production emits an explicit warning if vector fallback is enabled.
  profile: local
  dry_run: false
  # Metadata schema compatibility allow-list. Version 1 is current; migrations
  # may temporarily allow multiple versions, e.g. [1, 2].
  metadata_schema_versions: [1]
  vector:
    # set false in production to fail fast on vector init errors
    allow_fallback: true
    distance: cosine
  # Candidate vector-provider settings. Only providers.vector_db is active.
  vector_providers:
    pgvector:
      url: ""
      table_name: memory_vectors
    chromadb:
      path: ./data/chromadb
      url: ""
      host: 127.0.0.1
      port: 8000
      collection: memory_vectors
    qdrant:
      url: http://127.0.0.1:6333
      api_key: ""
      collection: memory_vectors
      prefer_grpc: false
    milvus:
      uri: http://127.0.0.1:19530
      token: ""
      collection: memory_vectors
    weaviate:
      url: http://127.0.0.1:8080
      api_key: ""
      collection: MemoryVector
    mongodb_atlas:
      uri: ""
      database: ai_memory_hub
      collection: memory_vectors
      index: memory_vector_index
    elasticsearch:
      url: http://127.0.0.1:9200
      username: ""
      password: ""
      index: memory_vectors
    opensearch:
      url: http://127.0.0.1:9200
      username: ""
      password: ""
      index: memory_vectors
    redis:
      url: redis://127.0.0.1:6379/0
      index: memory_vectors
      key_prefix: "memory_vectors:"
    pinecone:
      api_key: ""
      index: memory-vectors
      namespace: default
      cloud: aws
      region: us-east-1
      create_index: false
    turbopuffer:
      api_key: ""
      namespace: memory-vectors
      region: gcp-us-central1
    vespa:
      url: http://127.0.0.1:8080
      token: ""
      namespace: memory
      schema: memory_vector
      rank_profile: vector_similarity
    typesense:
      url: http://127.0.0.1:8108
      api_key: ""
      collection: memory_vectors
  # Candidate metadata-provider settings. Only providers.metadata_db is active.
  metadata_providers:
    postgres:
      url: ""
    mongodb:
      uri: ""
      database: ai_memory_hub
      conversations_collection: conversations
      facts_collection: facts
      generated_summaries_collection: generated_summaries
      schema_collection: schema_versions

retrieval:
  # Lower vector distance is better. Matches above this threshold are dropped
  # unless keyword/metadata signals justify keeping them.
  vector_score_threshold: 7.5
  keyword_enabled: true
  keyword_candidate_limit: 50
  keyword_weight: 0.25
  metadata_weight: 0.15
  candidate_multiplier: 3

memory:
  # permissive | require_save_intent | review_pending
  # Use require_save_intent for personal deployments where clients must include
  # metadata.save_intent before writes are accepted.
  # Use review_pending to hold unmarked inserts outside default reads until approval.
  insert_policy: permissive

# -------------------------
# ACTIVE PROVIDERS (BYOS/BYOA)
# -------------------------
providers:
  # Embedding provider used for chunk vectors. Multilingual retrieval depends on
  # choosing a model that supports your languages. Reindex or use a separate
  # vector namespace/index when changing model/provider/options on persistent data.
  embeddings: openai
  embedding_model: 'text-embedding-3-small' # OpenAI-compatible embedding model
  embedding_dimension: 1536 # text-embedding-3-small embedding dimension
  metadata_db: sqlite # active metadata provider: sqlite | postgres | mongodb
  # lancedb | chromadb | qdrant | milvus | weaviate | mongodb_atlas |
  # elasticsearch | opensearch | redis | pinecone | turbopuffer | vespa | typesense | pgvector | memory | in_memory
  vector_db: lancedb # active vector provider
  agent: mvp # Phase 1 ingestion agent (deterministic pipeline)

# -------------------------
# INTERFACES
# -------------------------
interfaces:
  mcp: true # Enable MCP tools
  api: true # Enable HTTP API (local-only by default)

# -------------------------
# PATHS
# -------------------------
paths:
  data_dir: './data' # SQLite/LanceDB data path
  logs_dir: './logs'

# -------------------------
# SCHEMA
# -------------------------
schema:
  file: './memory/schema/conversation.schema.json'

# -------------------------
# MCP SERVER SETTINGS
# -------------------------
mcp:
  host: '127.0.0.1'
  port: 8765

# -------------------------
# API SERVER SETTINGS
# -------------------------
api:
  host: '127.0.0.1'
  port: 8000
  auth: none # none | bearer_token | oauth_resource_server
  # Explicit browser-extension and local-dev origins allowed to call the API.
  # Example:
  # cors_allow_origins:
  #   - chrome-extension://abcdefghijklmnopabcdefghijklmnop
  #   - http://127.0.0.1:5173
  cors_allow_origins: []

# -------------------------
# OBSERVABILITY
# -------------------------
observability:
  logging:
    enabled: true
    format: text # text | json
    level: INFO
    access_logs: true
    request_id_header: x-request-id
    include_stack_traces: true
  tracing:
    enabled: false
    endpoint: http://otel-collector:4317
    protocol: grpc
    sample_ratio: 1.0
    service_name: ai-memory-hub
    environment: local
  metrics:
    enabled: false
    endpoint: http://otel-collector:4317
    protocol: grpc
  debug_payloads: false
  embedding_readiness_probe: false

# -------------------------
# PROVIDER SETTINGS
# -------------------------
openai:
  base_url: 'https://api.openai.com'
  api_key: 'your_api_key_here'
  model: 'gpt-4.1'

# ============================================================
# VARIATIONS (examples)
