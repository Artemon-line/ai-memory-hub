# ai-memory-hub configuration file
# Documented example with common variations.
# Keep this file committed as a reference template.

# -------------------------
# STORAGE LAYER
# -------------------------
storage:
  dry_run: false
  metadata_schema_versions: [1]
  vector:
    # set false in production to fail fast on vector init errors
    allow_fallback: true
    distance: cosine
  vector_providers:
    chromadb:
      path: ./data/chromadb
      url: ""
      host: 127.0.0.1
      port: 8000
      collection: memory_vectors
    qdrant:
      url: http://127.0.0.1:6333
      api_key: ""
      collection: memory_vectors
      prefer_grpc: false
    milvus:
      uri: http://127.0.0.1:19530
      token: ""
      collection: memory_vectors
    weaviate:
      url: http://127.0.0.1:8080
      api_key: ""
      collection: MemoryVector
    mongodb_atlas:
      uri: ""
      database: ai_memory_hub
      collection: memory_vectors
      index: memory_vector_index
    elasticsearch:
      url: http://127.0.0.1:9200
      username: ""
      password: ""
      index: memory_vectors
    opensearch:
      url: http://127.0.0.1:9200
      username: ""
      password: ""
      index: memory_vectors
    redis:
      url: redis://127.0.0.1:6379/0
      index: memory_vectors
      key_prefix: "memory_vectors:"
    pinecone:
      api_key: ""
      index: memory-vectors
      namespace: default
      cloud: aws
      region: us-east-1
      create_index: false
    turbopuffer:
      api_key: ""
      namespace: memory-vectors
      region: gcp-us-central1
    typesense:
      url: http://127.0.0.1:8108
      api_key: ""
      collection: memory_vectors
  metadata_providers:
    mongodb:
      uri: ""
      database: ai_memory_hub
      conversations_collection: conversations
      facts_collection: facts
      generated_summaries_collection: generated_summaries
      schema_collection: schema_versions

retrieval:
  # Lower vector distance is better. Matches above this threshold are dropped
  # unless keyword/metadata signals justify keeping them.
  vector_score_threshold: 7.5
  keyword_enabled: true
  keyword_candidate_limit: 50
  keyword_weight: 0.25
  metadata_weight: 0.15
  candidate_multiplier: 3

# -------------------------
# PROVIDERS (BYOS/BYOA)
# -------------------------
providers:
  embeddings: openai # Embedding provider used for chunk vectors
  embedding_model: 'text-embedding-3-small' # open_ai embedding_model
  embedding_dimension: 1536 # text-embedding-3-small embedding dimension
  metadata_db: sqlite # sqlite | postgres | mongodb
  metadata_dsn: '' # required when metadata_db=postgres
  # lancedb | chromadb | qdrant | milvus | weaviate | mongodb_atlas |
  # elasticsearch | opensearch | redis | pinecone | turbopuffer | typesense | pgvector | memory | in_memory
  vector_db: lancedb
  agent: mvp # Phase 1 ingestion agent (deterministic pipeline)

# -------------------------
# INTERFACES
# -------------------------
interfaces:
  mcp: true # Enable MCP tools
  api: true # Enable HTTP API (local-only by default)

# -------------------------
# PATHS
# -------------------------
paths:
  data_dir: './data' # SQLite/LanceDB data path
  logs_dir: './logs'

# -------------------------
# SCHEMA
# -------------------------
schema:
  file: './memory/schema/conversation.schema.json'

# -------------------------
# MCP SERVER SETTINGS
# -------------------------
mcp:
  host: '127.0.0.1'
  port: 8765

# -------------------------
# API SERVER SETTINGS
# -------------------------
api:
  host: '127.0.0.1'
  port: 8000
  auth: none # none | api_key
  api_key: '' # only used if auth: api_key

# -------------------------
# PROVIDER SETTINGS
# -------------------------
openai:
  base_url: 'https://api.openai.com'
  api_key: 'your_api_key_here'
  model: 'gpt-4.1'

# ============================================================
