# ai-memory-hub configuration file
# Documented example with common variations.
# Keep this file committed as a reference template.

# -------------------------
# STORAGE LAYER
# -------------------------
storage:
  dry_run: false
  metadata_schema_versions: [1]
  vector:
    # set false in production to fail fast on vector init errors
    allow_fallback: true

# -------------------------
# PROVIDERS (BYOS/BYOA)
# -------------------------
providers:
  inference: openai # LLM provider used for schema formatting
  embeddings: openai # Embedding provider used for chunk vectors
  embedding_model: 'text-embedding-3-small' # open_ai embedding_model
  embedding_dimention: 1536 # text-embedding-3-small embedding dimension
  metadata_db: sqlite # sqlite | postgres
  metadata_dsn: '' # required when metadata_db=postgres
  # lancedb | in_memory (in_memory maps to in-memory vector store in MVP)
  vector_db: lancedb
  agent: mvp # Phase 1 ingestion agent (deterministic pipeline)

# -------------------------
# INTERFACES
# -------------------------
interfaces:
  mcp: true # Enable MCP tools
  api: true # Enable HTTP API (local-only by default)

# -------------------------
# PATHS
# -------------------------
paths:
  data_dir: './data' # SQLite/LanceDB data path
  logs_dir: './logs'

# -------------------------
# SCHEMA
# -------------------------
schema:
  file: './memory/schema/conversation.schema.json'

# -------------------------
# MCP SERVER SETTINGS
# -------------------------
mcp:
  host: '127.0.0.1'
  port: 8765

# -------------------------
# API SERVER SETTINGS
# -------------------------
api:
  host: '127.0.0.1'
  port: 8000
  auth: none # none | api_key
  api_key: '' # only used if auth: api_key

# -------------------------
# PROVIDER SETTINGS
# -------------------------
openai:
  base_url: 'https://api.openai.com'
  api_key: 'your_api_key_here'
  model: 'gpt-4.1'

# ============================================================
# VARIATIONS (examples)
# ============================================================
#
# 1) Local dev (SQLite metadata + LanceDB vectors)
#
# providers:
#   embeddings: local
#   metadata_db: sqlite
#   metadata_dsn: ""
#   vector_db: lancedb
#
# storage:
#   dry_run: false
#   metadata_schema_versions: [1]
#   vector:
#     allow_fallback: true
#
# 2) Postgres metadata (BYOA)
#
# providers:
#   metadata_db: postgres
#   metadata_dsn: "postgresql://user:password@127.0.0.1:5432/memory"
#   vector_db: lancedb
#
# storage:
#   metadata_schema_versions: [1]
#
# 3) Strict production startup (no vector fallback)
#
# storage:
#   dry_run: false
#   vector:
#     allow_fallback: false
#
# 4) Dry-run mode for ingestion validation
#
# storage:
#   dry_run: true
#   vector:
#     allow_fallback: true
#
# 5) In-memory vectors path (current in_memory placeholder mode)
#
# providers:
#   vector_db: in_memory
#
# 6) Custom conversation schema
#
# schema:
#   file: "./memory/schema/conversation.schema.json"
