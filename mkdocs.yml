site_name: ai-memory-hub
site_description: Local-first deterministic memory ingestion hub
repo_url: https://github.com/Artemon-line/ai-memory-hub
repo_name: Artemon-line/ai-memory-hub
docs_dir: .docs-build
site_dir: site
strict: true

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - What Exists Now:
      - Current Features: docs/features.md
      - Technical Overview: docs/overview.md
      - Agent Integration: docs/agents.md
      - Storage Provider Examples: docs/storage_provider_examples.md
      - Observability: docs/observability.md
      - Architecture: docs/architecture.md
  - What Is Planned:
      - Planned Features: docs/planned_features.md
      - Roadmap: docs/roadmap.md
      - Documentation Map: docs/plans.md
  - Project:
      - Changelog: CHANGELOG.md
      - Contributing: CONTRIBUTING.md
      - Code Of Conduct: CODE_OF_CONDUCT.md
      - Security: SECURITY.md
  - MCP:
      - MCP Plan: docs/mcp_plan.md
      - MCP Client Smoke Plan: docs/mcp_client_smoke_plan.md
      - Real-Client MCP Smoke Plan: docs/real_client_mcp_smoke_plan.md
      - OpenClaw Native MCP Setup: docs/openclaw_native_mcp_setup.md
      - MCP Utility Compliance Plan: docs/mcp_utility_compliance_plan.md
      - MCP Authorization Compliance Plan: docs/bearer_api_key_auth_plan.md
  - Implementation Plans:
      - Documentation Map: docs/plans.md
      - Prioritized Feature Plan: docs/prioritized_feature_plan.md
      - Storage BYOA Plan: docs/storage_agnostic_byoa_plan.md
      - Browser Extension Capture Plan: docs/browser_extension_capture_plan.md
      - Bruno Integration Test Plan: docs/bruno_integration_test_plan.md
      - Project Workspace Collaboration Plan: docs/project_workspace_collaboration_plan.md
      - Deterministic Ingestion Plan: docs/deterministic_ingestion_plan.md
      - Token Budget Plan: docs/token_budget_plan.md
      - CLI Implementation Plan: docs/cli_implementation_plan.md
      - Plugin Readiness Plan: docs/plugin_readiness_plan.md
      - Release, Container, and Docs Publishing Plan: docs/release_container_docs_plan.md
      - First Release Readiness Plan: docs/first_release_readiness_plan.md
      - Repository Governance Settings: docs/repository_governance_settings.md
      - Release Promotion Assets: docs/release_promotion_assets.md
      - Project Promotion Plan: docs/project_promotion_plan.md
      - Observability, Logging, and Telemetry Plan: docs/observability_logging_telemetry_plan.md
      - Recurring Codebase Cleanup Plan: docs/recurring_codebase_cleanup_plan.md
  - Improvements:
      - Improvement Plans: docs/improvements.md
      - Client Feedback Improvement Plan: docs/improvements/client_feedback_improvement_plan.md
      - Top Priority MCP Result Shape: docs/improvements/top_priority_mcp_result_shape.md
      - Retrieval Precision Plan: docs/improvements/retrieval_precision_plan.md
      - Context Building Plan: docs/improvements/context_building_plan.md
      - Conversation Grouping Plan: docs/improvements/conversation_grouping_plan.md
      - Memory Quality And Fact Layer Plan: docs/improvements/memory_quality_fact_layer_plan.md
      - Edge Case Test Coverage Plan: docs/improvements/edge_case_test_coverage_plan.md
      - Explicit Memory Save Intent Plan: docs/improvements/explicit_memory_save_intent_plan.md
      - Vector Database Options: docs/improvements/vector_dbs.md
